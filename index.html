<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Multiplication Blitz</title>
  <meta name="description" content="A fast, kid-friendly multiplication practice game." />
  <style>
    :root {
      color-scheme: light;
      --bg1: #6ee7f9;
      --bg2: #a78bfa;
      --card: rgba(255,255,255,.92);
      --ink: #172033;
      --muted: #667085;
      --good: #16a34a;
      --bad: #dc2626;
      --accent: #f97316;
      --accent2: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 15%, #fff7ad 0 14rem, transparent 14.2rem),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .app {
      width: min(920px, 100%);
      display: grid;
      gap: 18px;
    }
    header, main, .panel {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.65);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(25, 40, 90, .22);
      backdrop-filter: blur(10px);
    }
    header {
      padding: 22px clamp(22px, 5vw, 42px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(2rem, 6vw, 4.4rem); line-height: .95; letter-spacing: -0.06em; }
    .subtitle { color: var(--muted); margin: 8px 0 0; font-weight: 700; }
    .pill { border-radius: 999px; background: #111827; color: white; padding: 10px 15px; font-weight: 900; }
    main { padding: clamp(20px, 5vw, 42px); display: grid; gap: 26px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat { background: white; border-radius: 20px; padding: 14px; text-align: center; border: 2px solid #edf2ff; }
    .label { display: block; color: var(--muted); font-size: .8rem; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
    .value { display: block; font-size: 1.8rem; font-weight: 1000; margin-top: 2px; }
    .question { text-align: center; padding: clamp(20px, 6vw, 54px); border-radius: 26px; background: linear-gradient(180deg, #fff, #f8fbff); border: 3px dashed #bfdbfe; }
    .problem { font-size: clamp(4rem, 18vw, 9rem); font-weight: 1000; letter-spacing: -0.08em; line-height: .9; }
    .feedback { min-height: 34px; margin-top: 12px; font-size: 1.35rem; font-weight: 1000; }
    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }
    form { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
    input {
      width: 100%;
      border: 4px solid #dbeafe;
      border-radius: 22px;
      padding: 16px 18px;
      font-size: 2rem;
      text-align: center;
      font-weight: 1000;
      outline: none;
    }
    input:focus { border-color: var(--accent2); box-shadow: 0 0 0 5px rgba(37,99,235,.15); }
    button {
      border: 0;
      border-radius: 22px;
      padding: 16px 22px;
      background: var(--accent);
      color: white;
      font-size: 1.1rem;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(249,115,22,.25);
    }
    button.secondary { background: var(--accent2); box-shadow: 0 10px 20px rgba(37,99,235,.2); }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; align-items: center; }
    select { border: 2px solid #dbeafe; border-radius: 16px; padding: 12px; font-weight: 900; background: white; }
    .hidden { display: none; }
    @media (max-width: 680px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      form { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Multiplication Blitz</h1>
        <p class="subtitle">60 seconds. Quick maths. Beat your best score.</p>
      </div>
      <div class="pill" aria-live="polite">Best: <span id="best">0</span></div>
    </header>

    <main>
      <section class="stats" aria-label="Game stats">
        <div class="stat"><span class="label">Time</span><span class="value" id="time">60</span></div>
        <div class="stat"><span class="label">Score</span><span class="value" id="score">0</span></div>
        <div class="stat"><span class="label">Streak</span><span class="value" id="streak">0</span></div>
        <div class="stat"><span class="label">Accuracy</span><span class="value" id="accuracy">100%</span></div>
      </section>

      <section class="question">
        <div class="problem" id="problem">Ready?</div>
        <div class="feedback" id="feedback">Choose a level and start.</div>
      </section>

      <form id="answerForm" autocomplete="off">
        <input id="answer" inputmode="numeric" pattern="[0-9]*" placeholder="Type answer" aria-label="Answer" disabled />
        <button type="submit">Answer</button>
      </form>

      <div class="controls">
        <label><strong>Level:</strong>
          <select id="level">
            <option value="6">Beginner: ×1 to ×6</option>
            <option value="10" selected>Classic: ×1 to ×10</option>
            <option value="12">Challenge: ×1 to ×12</option>
          </select>
        </label>
        <button class="secondary" id="start" type="button">Start 60s Blitz</button>
      </div>
    </main>
  </div>

  <script>
    const els = {
      best: document.getElementById('best'),
      time: document.getElementById('time'),
      score: document.getElementById('score'),
      streak: document.getElementById('streak'),
      accuracy: document.getElementById('accuracy'),
      problem: document.getElementById('problem'),
      feedback: document.getElementById('feedback'),
      form: document.getElementById('answerForm'),
      answer: document.getElementById('answer'),
      level: document.getElementById('level'),
      start: document.getElementById('start')
    };

    let state = { a: 0, b: 0, score: 0, streak: 0, attempts: 0, correct: 0, time: 60, timer: null, running: false };
    const bestKey = 'multiplicationBlitzBest';
    els.best.textContent = localStorage.getItem(bestKey) || '0';

    function rand(max) { return Math.floor(Math.random() * max) + 1; }
    function setFeedback(text, cls = '') { els.feedback.textContent = text; els.feedback.className = 'feedback ' + cls; }
    function updateStats() {
      els.time.textContent = state.time;
      els.score.textContent = state.score;
      els.streak.textContent = state.streak;
      const pct = state.attempts ? Math.round((state.correct / state.attempts) * 100) : 100;
      els.accuracy.textContent = pct + '%';
    }
    function nextProblem() {
      const max = Number(els.level.value);
      state.a = rand(max);
      state.b = rand(max);
      els.problem.textContent = `${state.a} × ${state.b}`;
      els.answer.value = '';
      els.answer.focus();
    }
    function endGame() {
      clearInterval(state.timer);
      state.running = false;
      els.answer.disabled = true;
      els.start.disabled = false;
      const currentBest = Number(localStorage.getItem(bestKey) || 0);
      if (state.score > currentBest) localStorage.setItem(bestKey, String(state.score));
      els.best.textContent = localStorage.getItem(bestKey) || '0';
      els.problem.textContent = 'Time!';
      setFeedback(`Final score: ${state.score}. ${state.score > currentBest ? 'New best! 🚀' : 'Try again!'}`);
    }
    function startGame() {
      clearInterval(state.timer);
      state = { a: 0, b: 0, score: 0, streak: 0, attempts: 0, correct: 0, time: 60, timer: null, running: true };
      els.answer.disabled = false;
      els.start.disabled = true;
      setFeedback('Go!', 'good');
      updateStats();
      nextProblem();
      state.timer = setInterval(() => {
        state.time -= 1;
        updateStats();
        if (state.time <= 0) endGame();
      }, 1000);
    }
    els.form.addEventListener('submit', (event) => {
      event.preventDefault();
      if (!state.running) return;
      const answer = Number(els.answer.value);
      if (!Number.isFinite(answer)) return;
      state.attempts += 1;
      if (answer === state.a * state.b) {
        state.correct += 1;
        state.streak += 1;
        state.score += 10 + Math.min(state.streak, 10);
        setFeedback(['Nice!', 'Correct!', 'Boom!', 'Great job!'][rand(4)-1], 'good');
        nextProblem();
      } else {
        state.streak = 0;
        setFeedback(`Oops — ${state.a} × ${state.b} = ${state.a * state.b}`, 'bad');
        els.answer.select();
      }
      updateStats();
    });
    els.start.addEventListener('click', startGame);
    updateStats();
  </script>
</body>
</html>
